<!doctype html>

<!--
  Documento principal de la aplicación Angular.

  Este archivo representa la estructura base HTML
  que carga el componente raíz de la aplicación.
-->
<html lang="en">

<head>

  <!--
    Configuración del conjunto de caracteres utilizado.
  -->
  <meta charset="utf-8">

  <!--
    Título mostrado en la pestaña del navegador.
  -->
  <title>Front</title>

  <!--
    Define la ruta base utilizada por Angular
    para el manejo de rutas internas.
  -->
  <base href="/">

  <!--
    Configuración responsive para adaptar
    la aplicación a diferentes dispositivos.
  -->
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!--
    Ícono principal mostrado en la pestaña del navegador.
  -->
  <link rel="icon" type="image/x-icon" href="favicon.ico">
</head>

<body>

<!--
  Componente raíz de Angular.

  Angular renderiza toda la aplicación
  dentro de esta etiqueta personalizada.
-->
<app-root></app-root>

</body>
</html>
